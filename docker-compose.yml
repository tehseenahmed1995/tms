services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tms_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - tms_network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: tms_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tms_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: tms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tms
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: Root@123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d tms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - tms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  tms_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
